<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ครัวของฉัน</title>
  <style>
    :root {
      color-scheme: light;
      --bg: oklch(1 0 0);
      --surface: oklch(0.974 0.006 80);
      --surface-strong: oklch(0.94 0.012 78);
      --ink: oklch(0.21 0.025 78);
      --muted: oklch(0.48 0.025 78);
      --line: oklch(0.88 0.014 78);
      --primary: oklch(0.58 0.12 60);
      --primary-dark: oklch(0.44 0.11 62);
      --primary-soft: oklch(0.94 0.055 72);
      --accent: oklch(0.48 0.12 155);
      --accent-soft: oklch(0.93 0.052 155);
      --danger: oklch(0.56 0.16 28);
      --danger-soft: oklch(0.94 0.04 28);
      --warning: oklch(0.78 0.12 85);
      --shadow: 0 6px 14px oklch(0.24 0.03 80 / 0.08);
      --radius: 12px;
      --tap: 44px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.45;
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: var(--tap);
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    a {
      color: var(--primary-dark);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .app {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 92px;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      min-height: 68px;
      padding: 14px 16px 10px;
      background: oklch(1 0 0 / 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.15;
    }

    .brand > div:last-child,
    .section-head > div {
      min-width: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      padding: 16px;
      min-width: 0;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    .bottom-nav {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: oklch(1 0 0 / 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .nav-btn {
      display: grid;
      gap: 2px;
      place-items: center;
      min-height: 56px;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      min-width: 0;
    }

    .nav-btn .icon {
      font-size: 1.18rem;
      line-height: 1;
    }

    .nav-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin: 6px 0 10px;
    }

    .section-head h2,
    .section-head h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .section-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }

    .panel-inner {
      padding: 14px;
    }

    .hero-panel {
      background: linear-gradient(135deg, var(--primary-soft), oklch(0.98 0.012 95));
      border: 1px solid oklch(0.88 0.04 76);
    }

    .hero-panel h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      line-height: 1.2;
      text-wrap: balance;
    }

    .hero-panel p {
      margin: 0;
      color: var(--muted);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
      min-width: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 10px;
      padding: 10px 13px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      font-weight: 750;
      text-decoration: none;
      text-align: center;
      white-space: normal;
    }

    .btn.primary {
      background: var(--primary);
      color: white;
      border-color: transparent;
    }

    .btn.accent {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .btn.danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: oklch(0.84 0.05 28);
    }

    .btn.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }

    .btn.small {
      min-height: 36px;
      padding: 7px 10px;
      border-radius: 9px;
      font-size: 0.88rem;
    }

    .btn.full {
      width: 100%;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .meal-today {
      display: grid;
      gap: 8px;
    }

    .meal-row,
    .item-row,
    .recipe-card,
    .category-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
    }

    .meal-row {
      align-items: flex-start;
    }

    .meal-label {
      min-width: 72px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 750;
    }

    .row-main {
      min-width: 0;
      flex: 1;
    }

    .row-main strong,
    .recipe-card strong,
    .category-row strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-main small,
    .recipe-card small,
    .category-row small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .badge.primary {
      background: var(--primary-soft);
      border-color: oklch(0.86 0.05 70);
      color: var(--primary-dark);
    }

    .badge.accent {
      background: var(--accent-soft);
      border-color: oklch(0.84 0.05 155);
      color: var(--accent);
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 750;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 96px;
    }

    input::placeholder,
    textarea::placeholder {
      color: oklch(0.45 0.02 78);
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(0.7 0.12 155 / 0.18);
    }

    .inline-form {
      display: none;
    }

    .inline-form.active {
      display: block;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .category-dot {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--dot, var(--primary));
      border: 1px solid oklch(0.2 0.02 78 / 0.12);
    }

    .recipe-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .recipe-card {
      align-items: flex-start;
    }

    .recipe-card.favorite {
      border-color: oklch(0.84 0.07 75);
      background: oklch(0.985 0.018 82);
    }

    .recipe-actions,
    .row-actions {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
      align-items: center;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      width: 38px;
      min-height: 38px;
      border-radius: 9px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 800;
    }

    .detail-head {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .detail-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-title h2 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.16;
      text-wrap: balance;
    }

    .recipe-body {
      display: grid;
      gap: 12px;
    }

    .text-block {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }

    .planner-controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .week-title {
      text-align: center;
      font-weight: 800;
    }

    .planner {
      display: grid;
      gap: 12px;
    }

    .day-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      overflow: hidden;
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 11px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      font-weight: 800;
    }

    .day-head span:last-child {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.86rem;
    }

    .meal-slot {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .meal-slot:last-child {
      border-bottom: 0;
    }

    .slot-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .slot-form select,
    .slot-form input {
      min-height: 38px;
      padding: 7px 9px;
      border-radius: 9px;
      font-size: 0.92rem;
    }

    .shopping-head {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .shopping-group {
      display: grid;
      gap: 8px;
    }

    .shopping-group h3 {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .check-row {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
    }

    .check-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      min-height: 22px;
      accent-color: var(--accent);
    }

    .check-row.done .row-main {
      color: var(--muted);
      text-decoration: line-through;
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 92px;
      left: 16px;
      z-index: 50;
      max-width: 420px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--ink);
      color: white;
      box-shadow: var(--shadow);
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease-out, transform 160ms ease-out;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (min-width: 720px) {
      .app {
        display: grid;
        grid-template-columns: 220px 1fr;
        padding-bottom: 0;
      }

      .topbar {
        grid-column: 1 / -1;
        padding-inline: 22px;
      }

      .bottom-nav {
        position: sticky;
        top: 68px;
        left: auto;
        right: auto;
        bottom: auto;
        align-self: start;
        display: flex;
        flex-direction: column;
        width: auto;
        min-height: calc(100vh - 68px);
        margin: 0;
        padding: 14px;
        border-top: 0;
        border-right: 1px solid var(--line);
      }

      .nav-btn {
        grid-template-columns: 28px 1fr;
        justify-items: start;
        padding-inline: 12px;
      }

      .content {
        padding: 24px;
        min-width: 0;
      }

      .stats-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .quick-actions,
      .search-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .planner {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">ครัว</div>
        <div>
          <h1>ครัวของฉัน</h1>
          <p id="subtitle">สมุดสูตร ตารางอาหาร รายการซื้อของ</p>
        </div>
      </div>
      <button class="btn small" type="button" data-tab="settings">ตั้งค่า</button>
    </header>

    <nav class="bottom-nav" aria-label="หน้าหลัก">
      <button class="nav-btn active" type="button" data-tab="home"><span class="icon">⌂</span><span>หน้าแรก</span></button>
      <button class="nav-btn" type="button" data-tab="categories"><span class="icon">▦</span><span>หมวด</span></button>
      <button class="nav-btn" type="button" data-tab="recipes"><span class="icon">□</span><span>สูตร</span></button>
      <button class="nav-btn" type="button" data-tab="planner"><span class="icon">▤</span><span>ตาราง</span></button>
      <button class="nav-btn" type="button" data-tab="shopping"><span class="icon">✓</span><span>ซื้อของ</span></button>
    </nav>

    <main class="content">
      <section class="view active" id="view-home"></section>
      <section class="view" id="view-categories"></section>
      <section class="view" id="view-recipes"></section>
      <section class="view" id="view-detail"></section>
      <section class="view" id="view-planner"></section>
      <section class="view" id="view-shopping"></section>
      <section class="view" id="view-settings"></section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "my-kitchen-app-v1";
    const mealSlots = [
      ["breakfast", "เช้า"],
      ["lunch", "กลางวัน"],
      ["dinner", "เย็น"]
    ];
    const dayNames = ["อา.", "จ.", "อ.", "พ.", "พฤ.", "ศ.", "ส."];
    const shoppingGroups = ["ผัก", "เนื้อสัตว์", "เครื่องปรุง", "ของแห้ง", "อื่น ๆ"];
    const categoryColors = [
      "oklch(0.70 0.13 60)",
      "oklch(0.64 0.12 155)",
      "oklch(0.66 0.11 32)",
      "oklch(0.66 0.10 235)",
      "oklch(0.72 0.12 95)",
      "oklch(0.62 0.13 335)"
    ];

    let data = loadData();
    let activeTab = "home";
    let recipeFilter = "all";
    let recipeSearch = "";
    let editingRecipeId = null;
    let editingCategoryId = null;
    let editingShoppingId = null;
    let detailRecipeId = null;
    let weekStart = startOfWeek(new Date());

    function uid(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function todayKey() {
      return toDateKey(new Date());
    }

    function toDateKey(date) {
      const d = new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function dateLabel(key) {
      const d = new Date(`${key}T00:00:00`);
      return `${d.getDate()}/${d.getMonth() + 1}`;
    }

    function fullDateLabel(key) {
      const d = new Date(`${key}T00:00:00`);
      return `${dayNames[d.getDay()]} ${d.getDate()}/${d.getMonth() + 1}`;
    }

    function startOfWeek(date) {
      const d = new Date(date);
      const diff = (d.getDay() + 6) % 7;
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - diff);
      return d;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function nl2br(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          return normalizeData(JSON.parse(stored));
        } catch (error) {
          console.warn("Cannot parse stored data", error);
        }
      }
      return seedData();
    }

    function seedData() {
      const now = new Date().toISOString();
      const categories = [
        { id: uid("cat"), name: "กับข้าว", color: categoryColors[0], createdAt: now },
        { id: uid("cat"), name: "อาหารจานเดียว", color: categoryColors[1], createdAt: now },
        { id: uid("cat"), name: "ของหวาน", color: categoryColors[2], createdAt: now }
      ];
      const recipes = [
        {
          id: uid("recipe"),
          title: "กะเพราไก่ไข่ดาว",
          categoryId: categories[1].id,
          videoUrl: "",
          ingredients: "ไก่สับ 200 กรัม\nใบกะเพรา 1 กำมือ\nกระเทียม พริก\nซอสปรุงรส น้ำปลา น้ำตาลเล็กน้อย\nไข่ไก่ 1 ฟอง",
          steps: "1. ผัดกระเทียมพริกให้หอม\n2. ใส่ไก่สับ ผัดจนสุก\n3. ปรุงรสแล้วใส่ใบกะเพรา\n4. ทอดไข่ดาว เสิร์ฟกับข้าว",
          notes: "ทำเผ็ดน้อยไว้ก่อน แล้วเติมพริกตอนกินได้",
          favorite: true,
          createdAt: now,
          updatedAt: now
        },
        {
          id: uid("recipe"),

    function normalizeData(raw) {
      const seeded = seedData();
      return {
        categories: Array.isArray(raw.categories) ? raw.categories : seeded.categories,
        recipes: Array.isArray(raw.recipes) ? raw.recipes : [],
        mealPlan: raw.mealPlan && typeof raw.mealPlan === "object" ? raw.mealPlan : {},
        shoppingItems: Array.isArray(raw.shoppingItems) ? raw.shoppingItems : [],
        settings: { ...seeded.settings, ...(raw.settings || {}) }
      };
    }

    function saveData(message) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
      if (message) showToast(message);
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1900);
    }

    function setTab(tab) {
      activeTab = tab;
      if (tab !== "detail") detailRecipeId = null;
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getCategory(id) {
      return data.categories.find((category) => category.id === id);
    }

    function getRecipe(id) {
      return data.recipes.find((recipe) => recipe.id === id);
    }

    function mealName(entry) {
      if (!entry) return "ยังไม่ได้วางแผน";
      const recipe = entry.recipeId ? getRecipe(entry.recipeId) : null;
      return recipe ? recipe.title : entry.custom || "ยังไม่ได้วางแผน";
    }

    function cycleSummary() {
      const start = new Date(`${data.settings.cycleStart || todayKey()}T00:00:00`);
      const days = Number(data.settings.cycleDays || 7);
      const now = new Date();
      let next = new Date(start);
      while (next < startOfDay(now)) {
        next.setDate(next.getDate() + days);
      }
      const diff = Math.ceil((next - startOfDay(now)) / 86400000);
      return { next: toDateKey(next), daysLeft: Math.max(diff, 0), days };
    }

    function startOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

        <div class="stack">
          <div class="section-head">
            <div><h2>ตั้งค่าและสำรองข้อมูล</h2><p>ข้อมูลทั้งหมดเก็บใน browser เครื่องนี้</p></div>
          </div>
          <section class="panel">
            <form class="panel-inner settings-grid" id="settings-form">
              <label>รอบซื้อของ
                <select name="cycleDays">
                  <option value="7" ${Number(data.settings.cycleDays) === 7 ? "selected" : ""}>ทุก 7 วัน</option>
                  <option value="14" ${Number(data.settings.cycleDays) === 14 ? "selected" : ""}>ทุก 14 วัน</option>
                </select>
              </label>
              <label>วันที่เริ่มรอบล่าสุด
                <input name="cycleStart" type="date" value="${escapeHtml(data.settings.cycleStart || todayKey())}">
              </label>
              <button class="btn primary" type="submit">บันทึกตั้งค่า</button>
            </form>
          </section>
          <section class="panel">
            <div class="panel-inner stack">
              <div>
                <h3>สำรองข้อมูล</h3>
                <p>Export เป็นไฟล์ JSON แล้ว Import กลับมาได้เมื่อต้องย้ายเครื่องหรือกันข้อมูลหาย</p>
              </div>
              <div class="toolbar">
                <button class="btn" type="button" data-action="export-json">Export JSON</button>
                <label class="btn" for="import-json">Import JSON</label>
                <input id="import-json" type="file" accept="application/json" hidden>
              </div>
            </div>
          </section>
          <section class="panel">
            <div class="panel-inner stack">
              <div>
                <h3>เริ่มใหม่</h3>
                <p>รีเซ็ตกลับเป็นข้อมูลตัวอย่างเริ่มต้น เหมาะสำหรับทดลองแอปใหม่อีกครั้ง</p>
              </div>
              <button class="btn danger full" type="button" data-action="reset-data">รีเซ็ตข้อมูลทั้งหมด</button>
            </div>
          </section>
        </div>
      `;
    }

    document.addEventListener("click", (event) => {
      const button = event.target.closest("button, label.btn");
      if (!button) return;
      const action = button.dataset.action;
      const tab = button.dataset.tab;
      const id = button.dataset.id;

      if (tab) {
        setTab(tab);
        return;
      }

      if (!action) return;
      if (action === "quick-recipe" || action === "new-recipe") {
        editingRecipeId = "new";
        setTab("recipes");
      }
      if (action === "quick-shopping" || action === "new-shopping") {
        editingShoppingId = "new";
        setTab("shopping");
      }
      if (action === "new-category") {
        editingCategoryId = "new";
        render();
      }
      if (action === "cancel-category") {
        editingCategoryId = null;
        render();
      }
      if (action === "edit-category") {
        editingCategoryId = id;
        render();
      }
      if (action === "delete-category") deleteCategory(id);
      if (action === "filter-category") {
        recipeFilter = id;
        setTab("recipes");
      }
      if (action === "cancel-recipe") {
        editingRecipeId = null;
        render();
      }
      if (action === "open-recipe") {
        detailRecipeId = id;
        activeTab = "detail";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      if (action === "edit-recipe") {
        editingRecipeId = id;
        setTab("recipes");
      }
      if (action === "delete-recipe") deleteRecipe(id);
      if (action === "toggle-favorite") toggleFavorite(id);
      if (action === "add-recipe-shopping") addRecipeToShopping(id);
      if (action === "prev-week") {
        weekStart = addDays(weekStart, -7);
        render();
      }
      if (action === "next-week") {
        weekStart = addDays(weekStart, 7);
        render();
      }
      if (action === "cancel-shopping") {
        editingShoppingId = null;
        render();
      }
      if (action === "edit-shopping") {
        editingShoppingId = id;
        render();
      }
      if (action === "delete-shopping") deleteShopping(id);
      if (action === "clear-done") clearDoneShopping();
      if (action === "mark-all-undone") markAllUndone();
      if (action === "export-json") exportJson();
      if (action === "reset-data") resetData();
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (target.id === "recipe-filter") {
        recipeFilter = target.value;
        render();
      }
      if (target.dataset.action === "plan-recipe") {
        updatePlan(target.dataset.date, target.dataset.slot, { recipeId: target.value, custom: target.value ? "" : getPlanEntry(target.dataset.date, target.dataset.slot).custom });
      }
      if (target.dataset.action === "toggle-shopping") {
        const item = data.shoppingItems.find((entry) => entry.id === target.dataset.id);
        if (item) {
          item.done = target.checked;
          saveData(item.done ? "ติ๊กซื้อแล้ว" : "ย้ายกลับไปรายการที่ต้องซื้อ");
        }
      }
      if (target.id === "import-json") {
        importJson(target.files[0]);
        target.value = "";
      }
    });

    document.addEventListener("input", (event) => {
      const target = event.target;
      if (target.id === "recipe-search") {
        recipeSearch = target.value;
        renderRecipes();
      }
      if (target.dataset.action === "plan-custom") {
        updatePlan(target.dataset.date, target.dataset.slot, { recipeId: "", custom: target.value }, false);
      }
    });

    document.addEventListener("submit", (event) => {
      event.preventDefault();
      if (event.target.id === "category-form") saveCategory(new FormData(event.target));
      if (event.target.id === "recipe-form") saveRecipe(new FormData(event.target));
      if (event.target.id === "shopping-form") saveShopping(new FormData(event.target));
      if (event.target.id === "settings-form") saveSettings(new FormData(event.target));
    });

    function saveCategory(form) {
      const name = form.get("name").trim();
      const color = form.get("color");
      if (!name) return;
      if (editingCategoryId && editingCategoryId !== "new") {
        const category = getCategory(editingCategoryId);
        category.name = name;
        category.color = color;
      } else {
        data.categories.push({ id: uid("cat"), name, color, createdAt: new Date().toISOString() });
      }
      editingCategoryId = null;
      saveData("บันทึกหมวดแล้ว");
    }

    function deleteCategory(id) {
      const used = data.recipes.some((recipe) => recipe.categoryId === id);
      if (used) {
        showToast("หมวดนี้ยังมีเมนูอยู่ ย้ายหรือลบเมนูก่อน");
        return;
      }
      if (!confirm("ลบหมวดนี้ใช่ไหม")) return;
      data.categories = data.categories.filter((category) => category.id !== id);
      saveData("ลบหมวดแล้ว");
    }

    function saveRecipe(form) {
      if (!data.categories.length) {
        showToast("ต้องมีหมวดก่อนเพิ่มสูตร");
        return;
      }
      const payload = {
        title: form.get("title").trim(),
        categoryId: form.get("categoryId"),
        videoUrl: form.get("videoUrl").trim(),
        ingredients: form.get("ingredients").trim(),
        steps: form.get("steps").trim(),
        notes: form.get("notes").trim(),
        favorite: Boolean(form.get("favorite")),
        updatedAt: new Date().toISOString()
      };
      if (!payload.title) return;
      if (editingRecipeId && editingRecipeId !== "new") {
        Object.assign(getRecipe(editingRecipeId), payload);
      } else {
        data.recipes.push({ id: uid("recipe"), ...payload, createdAt: new Date().toISOString() });
      }
      editingRecipeId = null;
      saveData("บันทึกเมนูแล้ว");
    }

    function deleteRecipe(id) {
      if (!confirm("ลบสูตรนี้ใช่ไหม")) return;
      data.recipes = data.recipes.filter((recipe) => recipe.id !== id);
      Object.values(data.mealPlan).forEach((day) => {
        mealSlots.forEach(([slot]) => {
          if (day[slot]?.recipeId === id) day[slot].recipeId = "";
        });
      });
      if (detailRecipeId === id) {
        detailRecipeId = null;
        activeTab = "recipes";
      }
      saveData("ลบสูตรแล้ว");
    }

    function toggleFavorite(id) {
      const recipe = getRecipe(id);
      if (!recipe) return;
      recipe.favorite = !recipe.favorite;
      recipe.updatedAt = new Date().toISOString();
      saveData(recipe.favorite ? "เพิ่มเป็นเมนูโปรดแล้ว" : "เอาออกจากเมนูโปรดแล้ว");
    }

    function addRecipeToShopping(id) {
      const recipe = getRecipe(id);
      if (!recipe || !recipe.ingredients) {
        showToast("สูตรนี้ยังไม่มีส่วนผสม");
        return;
      }
      const lines = recipe.ingredients.split("\n").map((line) => line.trim()).filter(Boolean);
      const now = new Date().toISOString();
      lines.forEach((line) => {
        data.shoppingItems.push({ id: uid("shop"), name: line, qty: "", unit: "", group: "อื่น ๆ", done: false, createdAt: now });
      });
      saveData("เพิ่มส่วนผสมไปที่รายการซื้อของแล้ว");
    }

    function getPlanEntry(date, slot) {
      return data.mealPlan[date]?.[slot] || { recipeId: "", custom: "" };
    }

    function updatePlan(date, slot, entry, notify = true) {
      if (!data.mealPlan[date]) data.mealPlan[date] = {};
      data.mealPlan[date][slot] = { ...getPlanEntry(date, slot), ...entry };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      if (notify) saveData("อัปเดตตารางแล้ว");
    }

    function saveShopping(form) {
      const payload = {
        name: form.get("name").trim(),
        qty: form.get("qty").trim(),
        unit: form.get("unit").trim(),
        group: form.get("group"),
        done: false
      };
      if (!payload.name) return;
      if (editingShoppingId && editingShoppingId !== "new") {
        const item = data.shoppingItems.find((entry) => entry.id === editingShoppingId);
        Object.assign(item, payload);
      } else {
        data.shoppingItems.push({ id: uid("shop"), ...payload, createdAt: new Date().toISOString() });
      }
      editingShoppingId = null;
      saveData("บันทึกรายการซื้อของแล้ว");
    }

    function deleteShopping(id) {
      if (!confirm("ลบรายการนี้ใช่ไหม")) return;
      data.shoppingItems = data.shoppingItems.filter((item) => item.id !== id);
      saveData("ลบรายการแล้ว");
    }

    function clearDoneShopping() {
      const count = data.shoppingItems.filter((item) => item.done).length;
      if (!count) {
        showToast("ยังไม่มีรายการที่ซื้อแล้ว");
        return;
      }
      if (!confirm(`ล้างรายการที่ซื้อแล้ว ${count} รายการใช่ไหม`)) return;
      data.shoppingItems = data.shoppingItems.filter((item) => !item.done);
      saveData("ล้างรายการที่ซื้อแล้ว");
    }

    function markAllUndone() {
      data.shoppingItems.forEach((item) => item.done = false);
      saveData("เริ่มเช็กรอบใหม่แล้ว");
    }

    function saveSettings(form) {
      data.settings.cycleDays = Number(form.get("cycleDays"));
      data.settings.cycleStart = form.get("cycleStart") || todayKey();
      saveData("บันทึกตั้งค่าแล้ว");
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `my-kitchen-${todayKey()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("Export ข้อมูลแล้ว");
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = normalizeData(JSON.parse(reader.result));
          data = imported;
          saveData("Import ข้อมูลแล้ว");
        } catch (error) {
          showToast("ไฟล์ JSON ไม่ถูกต้อง");
        }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if (!confirm("รีเซ็ตข้อมูลทั้งหมดกลับเป็นตัวอย่างเริ่มต้นใช่ไหม")) return;
      data = seedData();
      activeTab = "home";
      saveData("รีเซ็ตข้อมูลแล้ว");
    }

    render();
  </script>
</body>
</html>
