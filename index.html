<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ครัวของฉัน</title>
  <style>
    :root {
      color-scheme: light;
      --bg: oklch(0.985 0.003 150);
      --surface: oklch(1 0 0);
      --surface-2: oklch(0.965 0.004 150);
      --ink: oklch(0.18 0.018 150);
      --muted: oklch(0.48 0.018 150);
      --faint: oklch(0.72 0.012 150);
      --line: oklch(0.90 0.009 150);
      --green: oklch(0.52 0.145 148);
      --green-dark: oklch(0.38 0.12 148);
      --green-soft: oklch(0.94 0.052 148);
      --red: oklch(0.56 0.18 28);
      --red-soft: oklch(0.95 0.04 28);
      --orange: oklch(0.72 0.14 62);
      --yellow-soft: oklch(0.96 0.055 86);
      --blue-soft: oklch(0.95 0.035 245);
      --shadow: 0 10px 22px oklch(0.2 0.02 150 / 0.08);
      --shadow-sm: 0 4px 10px oklch(0.2 0.02 150 / 0.06);
      --radius: 14px;
      --tap: 44px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.45;
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: var(--tap);
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: var(--tap);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: oklch(0.48 0.018 150);
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--green);
      box-shadow: 0 0 0 3px oklch(0.52 0.145 148 / 0.18);
      outline: none;
    }

    a {
      color: var(--green-dark);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      padding-bottom: calc(84px + env(safe-area-inset-bottom));
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 76px;
      padding: calc(12px + env(safe-area-inset-top)) 18px 12px;
      background: oklch(0.985 0.003 150 / 0.94);
      backdrop-filter: blur(14px);
    }

    .top h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .top p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 42px;
      min-width: 42px;
      min-height: 42px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      font-weight: 800;
    }

    .content {
      padding: 10px 18px 22px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .bottom-nav {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 2px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: oklch(1 0 0 / 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .nav-btn {
      display: grid;
      gap: 3px;
      place-items: center;
      min-width: 0;
      min-height: 58px;
      border-radius: 12px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 750;
    }

    .nav-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-btn.active {
      color: var(--green);
      background: var(--green-soft);
    }

    .stack { display: grid; gap: 16px; }
    .list { display: grid; gap: 10px; }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 2px 0 10px;
    }

    .section-head h2,
    .section-head h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .section-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .card.pad { padding: 14px; }

    .soft {
      background: linear-gradient(135deg, var(--green-soft), oklch(0.985 0.01 128));
      border-color: oklch(0.88 0.04 148);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: var(--tap);
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 800;
      text-align: center;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }

    .btn.primary {
      background: var(--green);
      border-color: transparent;
      color: white;
    }

    .btn.danger {
      background: var(--red-soft);
      border-color: oklch(0.86 0.05 28);
      color: var(--red);
    }

    .btn.ghost {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      color: var(--muted);
    }

    .btn.small {
      min-height: 36px;
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 0.88rem;
    }

    .btn.full { width: 100%; }

    .pill-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 4px;
      scrollbar-width: none;
    }

    .pill-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-weight: 750;
      box-shadow: none;
    }

    .chip.active {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .quick-card {
      display: grid;
      place-items: center;
      gap: 8px;
      min-height: 92px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      font-size: 0.82rem;
      font-weight: 750;
      color: var(--ink);
      text-align: center;
    }

    .quick-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 11px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 900;
    }

    .youtube { background: oklch(0.95 0.045 28); color: var(--red); }
    .tiktok { background: oklch(0.95 0.018 250); color: var(--ink); }

    .meal-list {
      display: grid;
    }

    .meal-row {
      display: grid;
      grid-template-columns: 94px 82px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .meal-row:last-child { border-bottom: 0; }

    .meal-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .meal-icon {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: var(--yellow-soft);
      color: oklch(0.55 0.13 70);
      font-size: 0.86rem;
    }

    .meal-icon.night {
      background: var(--blue-soft);
      color: oklch(0.48 0.12 260);
    }

    .thumb {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 1 / 0.72;
      border-radius: 12px;
      overflow: hidden;
      background:
        radial-gradient(circle at 70% 32%, oklch(0.82 0.12 48), transparent 17%),
        radial-gradient(circle at 36% 56%, oklch(0.64 0.16 30), transparent 22%),
        linear-gradient(135deg, oklch(0.92 0.055 82), oklch(0.74 0.08 42));
      border: 1px solid oklch(0.2 0.02 150 / 0.08);
      color: white;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb::after {
      content: attr(data-initial);
      position: absolute;
      right: 8px;
      bottom: 6px;
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: oklch(0.18 0.018 150 / 0.5);
      color: white;
      font-weight: 900;
      font-size: 0.86rem;
    }

    .thumb.has-img::after { display: none; }

    .meal-main strong,
    .recipe-card strong,
    .bill-card strong,
    .item-row strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meal-main small,
    .recipe-card small,
    .bill-card small,
    .item-row small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .recipe-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 142px;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .recipe-strip::-webkit-scrollbar { display: none; }

    .recipe-mini {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .recipe-mini .body { padding: 8px; }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .recipe-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .recipe-card .body {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .recipe-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-size: 0.76rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .tag.muted {
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field { display: grid; gap: 6px; font-weight: 800; font-size: 0.9rem; }
    .field span { color: var(--muted); font-size: 0.78rem; font-weight: 700; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hidden { display: none !important; }

    .empty {
      display: grid;
      gap: 10px;
      place-items: center;
      padding: 28px 18px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    .empty strong {
      color: var(--ink);
      font-size: 1.05rem;
    }

    .week-days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 14px;
    }

    .day-btn {
      display: grid;
      place-items: center;
      gap: 4px;
      min-height: 58px;
      border-radius: 999px;
      color: var(--ink);
      font-weight: 800;
    }

    .day-btn span:first-child {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .day-btn.active {
      background: var(--green);
      color: white;
    }

    .day-btn.active span:first-child { color: white; }

    .plan-section {
      display: grid;
      gap: 10px;
    }

    .plan-slot {
      display: grid;
      gap: 10px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .plan-slot:last-child { border-bottom: 0; }

    .slot-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .slot-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .slot-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .slot-card {
      display: grid;
      gap: 6px;
      min-height: 122px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .slot-card.add {
      place-items: center;
      border-style: dashed;
      color: var(--muted);
      box-shadow: none;
    }

    .bill-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .bill-card .summary {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .progress {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-2);
    }

    .progress span {
      display: block;
      width: var(--value, 0%);
      height: 100%;
      background: var(--green);
    }

    .bill-photo {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 14px;
      background: var(--green-soft);
      border: 1px solid oklch(0.84 0.045 148);
      color: var(--green-dark);
      font-weight: 900;
      overflow: hidden;
    }

    .bill-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .photo-tile {
      position: relative;
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--surface-2);
    }

    .photo-tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-tile button {
      position: absolute;
      right: 4px;
      top: 4px;
      width: 28px;
      min-width: 28px;
      min-height: 28px;
      border-radius: 999px;
      background: oklch(0.18 0.018 150 / 0.72);
      color: white;
      font-size: 0.8rem;
      box-shadow: none;
    }

    .item-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
    }

    .item-row:last-child { border-bottom: 0; }

    .item-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      min-height: 22px;
      accent-color: var(--green);
    }

    .item-row.done .item-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      padding-bottom: 2px;
      color: var(--ink);
      font-weight: 900;
    }

    .detail-head {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .detail-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-title h2 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.15;
      text-wrap: balance;
    }

    .text-block {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: calc(88px + env(safe-area-inset-bottom));
      left: 18px;
      z-index: 60;
      max-width: 430px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--ink);
      color: white;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 820px) {
      body {
        background: linear-gradient(180deg, oklch(0.965 0.004 150), oklch(0.94 0.006 150));
      }

      .app {
        margin-top: 24px;
        margin-bottom: 24px;
        min-height: calc(100vh - 48px);
        border: 1px solid var(--line);
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 26px 70px oklch(0.2 0.02 150 / 0.13);
      }

      .bottom-nav { position: sticky; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top" id="topbar"></header>
    <main class="content">
      <section id="view-home" class="view active"></section>
      <section id="view-recipes" class="view"></section>
      <section id="view-recipe-detail" class="view"></section>
      <section id="view-planner" class="view"></section>
      <section id="view-shopping" class="view"></section>
      <section id="view-bill-detail" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>
    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <button class="nav-btn active" type="button" data-tab="home" aria-label="วันนี้">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5 10.5V20h14v-9.5"></path><path d="M9 20v-6h6v6"></path></svg>
        <span>วันนี้</span>
      </button>
      <button class="nav-btn" type="button" data-tab="recipes" aria-label="สูตรอาหาร">
        <svg viewBox="0 0 24 24"><path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H20v17H8.5A3.5 3.5 0 0 0 5 22z"></path><path d="M5 5.5V22"></path><path d="M9 6h7"></path><path d="M9 10h6"></path></svg>
        <span>สูตรอาหาร</span>
      </button>
      <button class="nav-btn" type="button" data-tab="planner" aria-label="ตารางสัปดาห์">
        <svg viewBox="0 0 24 24"><path d="M7 3v3"></path><path d="M17 3v3"></path><rect x="4" y="5" width="16" height="16" rx="2"></rect><path d="M4 10h16"></path><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path></svg>
        <span>ตารางสัปดาห์</span>
      </button>
      <button class="nav-btn" type="button" data-tab="shopping" aria-label="รายการซื้อของ">
        <svg viewBox="0 0 24 24"><path d="M6 6h15l-2 8H8z"></path><path d="M6 6 5 3H2"></path><path d="M8 18a1.5 1.5 0 1 0 0 .01"></path><path d="M18 18a1.5 1.5 0 1 0 0 .01"></path></svg>
        <span>รายการซื้อของ</span>
      </button>
    </nav>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "my-kitchen-app-v2";
    const OLD_KEY = "my-kitchen-app-v1";
    const slots = [
      { id: "breakfast", label: "มื้อเช้า", short: "เช้า", time: "07:30", tone: "day" },
      { id: "lunch", label: "มื้อกลางวัน", short: "กลางวัน", time: "12:30", tone: "day" },
      { id: "dinner", label: "มื้อเย็น", short: "เย็น", time: "18:30", tone: "night" }
    ];
    const groups = ["ผัก", "เนื้อสัตว์", "เครื่องปรุง", "ของแห้ง", "อื่น ๆ"];
    const dayNames = ["อา.", "จ.", "อ.", "พ.", "พฤ.", "ศ.", "ส."];
    const categorySeeds = ["กับข้าว", "อาหารจานเดียว", "ของหวาน", "เมนูโปรด"];
    const sourceOptions = ["เพิ่มเอง", "YouTube", "TikTok"];

    let data = loadData();
    let activeView = "home";
    let activeRecipeFilter = "ทั้งหมด";
    let recipeSearch = "";
    let editingRecipeId = null;
    let editingCategoryId = null;
    let detailRecipeId = null;
    let selectedDate = todayKey();
    let activeBillId = null;
    let editingBillId = null;
    let editingItemId = null;

    function uid(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function todayKey() {
      return dateKey(new Date());
    }

    function dateKey(input) {
      const d = new Date(input);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function parseDate(key) {
      return new Date(`${key}T00:00:00`);
    }

    function shortDate(key) {
      const d = parseDate(key);
      return `${d.getDate()}/${d.getMonth() + 1}`;
    }

    function longDate(key) {
      const d = parseDate(key);
      return `${dayNames[d.getDay()]} ${d.getDate()}/${d.getMonth() + 1}`;
    }

    function startOfWeek(date) {
      const d = new Date(date);
      const diff = (d.getDay() + 6) % 7;
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - diff);
      return d;
    }

    function addDays(date, amount) {
      const d = new Date(date);
      d.setDate(d.getDate() + amount);
      return d;
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function nl(value) {
      return esc(value).replace(/\n/g, "<br>");
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { return normalize(JSON.parse(stored)); } catch (error) { console.warn(error); }
      }
      const old = localStorage.getItem(OLD_KEY);
      if (old) {
        try {
          const migrated = migrateOld(JSON.parse(old));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
          return migrated;
        } catch (error) { console.warn(error); }
      }
      return seedData();
    }

    function seedData() {
      const now = new Date().toISOString();
      const categories = categorySeeds.map((name) => ({ id: uid("cat"), name, createdAt: now }));
      const getCat = (name) => categories.find((cat) => cat.name === name).id;
      const recipes = [
        makeRecipe("ข้าวต้มหมูสับ", getCat("อาหารจานเดียว"), "YouTube", true, "ข้าวสวย 1 ถ้วย\nหมูสับ 150 กรัม\nกระเทียมเจียว\nต้นหอม ผักชี", "ต้มน้ำซุป ใส่หมูสับ ใส่ข้าว ปรุงรส แล้วโรยกระเทียมเจียว", ""),
        makeRecipe("กะเพราหมูสับ", getCat("กับข้าว"), "TikTok", true, "หมูสับ 200 กรัม\nกะเพรา 1 กำ\nพริก กระเทียม\nซอสปรุงรส", "ผัดพริกกระเทียม ใส่หมู ปรุงรส ใส่กะเพราปิดท้าย", ""),
        makeRecipe("ต้มยำกุ้งน้ำข้น", getCat("กับข้าว"), "เพิ่มเอง", false, "กุ้งสด\nข่า ตะไคร้ ใบมะกรูด\nเห็ด\nนมข้นจืด น้ำพริกเผา", "ต้มน้ำสมุนไพร ใส่เห็ดและกุ้ง ปรุงรส ใส่นมข้นจืดท้ายสุด", ""),
        makeRecipe("ผัดไทยกุ้งสด", getCat("อาหารจานเดียว"), "YouTube", false, "เส้นจันท์\nกุ้งสด\nไข่\nถั่วงอก กุยช่าย\nน้ำซอสผัดไทย", "ผัดเส้นกับซอส ใส่ไข่และกุ้ง คลุกผัก เสิร์ฟกับถั่วลิสง", "")
      ];
      const mealPlan = {};
      mealPlan[todayKey()] = {
        breakfast: { recipeId: recipes[0].id, custom: "" },
        lunch: { recipeId: recipes[1].id, custom: "" },
        dinner: { recipeId: recipes[2].id, custom: "" }
      };
      return {
        categories,
        recipes,
        mealPlan,
        shoppingBills: [],
        settings: { cycleDays: 7, cycleStart: todayKey() }
      };
    }

    function makeRecipe(title, categoryId, source, favorite, ingredients, steps, image) {
      const now = new Date().toISOString();
      return {
        id: uid("recipe"),
        title,
        categoryId,
        source,
        videoUrl: "",
        image: image || "",
        ingredients,
        steps,
        notes: "",
        favorite,
        createdAt: now,
        updatedAt: now
      };
    }

    function migrateOld(old) {
      const seeded = seedData();
      const categories = Array.isArray(old.categories) && old.categories.length
        ? old.categories.map((cat) => ({ id: cat.id || uid("cat"), name: cat.name || "หมวด", createdAt: cat.createdAt || new Date().toISOString() }))
        : seeded.categories;
      const recipes = Array.isArray(old.recipes) ? old.recipes.map((recipe) => ({
        id: recipe.id || uid("recipe"),
        title: recipe.title || "เมนูไม่มีชื่อ",
        categoryId: recipe.categoryId || categories[0]?.id,
        source: recipe.videoUrl ? "YouTube" : "เพิ่มเอง",
        videoUrl: recipe.videoUrl || "",
        image: recipe.image || "",
        ingredients: recipe.ingredients || "",
        steps: recipe.steps || "",
        notes: recipe.notes || "",
        favorite: Boolean(recipe.favorite),
        createdAt: recipe.createdAt || new Date().toISOString(),
        updatedAt: recipe.updatedAt || new Date().toISOString()
      })) : seeded.recipes;
      const billItems = Array.isArray(old.shoppingItems) ? old.shoppingItems.map((item) => ({
        id: item.id || uid("item"),
        name: item.name || "",
        qty: item.qty || "",
        unit: item.unit || "",
        group: groups.includes(item.group) ? item.group : "อื่น ๆ",
        done: Boolean(item.done)
      })) : [];
      return {
        categories,
        recipes,
        mealPlan: old.mealPlan && typeof old.mealPlan === "object" ? old.mealPlan : {},
        shoppingBills: billItems.length ? [{
          id: uid("bill"),
          title: "รายการซื้อของเดิม",
          date: todayKey(),
          budget: "",
          photos: [],
          items: billItems,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }] : [],
        settings: { ...seeded.settings, ...(old.settings || {}) }
      };
    }

    function normalize(raw) {
      const seeded = seedData();
      return {
        categories: Array.isArray(raw.categories) ? raw.categories : seeded.categories,
        recipes: Array.isArray(raw.recipes) ? raw.recipes.map((recipe) => ({ image: "", source: "เพิ่มเอง", ...recipe })) : seeded.recipes,
        mealPlan: raw.mealPlan && typeof raw.mealPlan === "object" ? raw.mealPlan : {},
        shoppingBills: Array.isArray(raw.shoppingBills) ? raw.shoppingBills.map((bill) => ({ photos: [], items: [], ...bill })) : [],
        settings: { ...seeded.settings, ...(raw.settings || {}) }
      };
    }

    function save(message) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
      if (message) toast(message);
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    function category(id) {
      return data.categories.find((cat) => cat.id === id);
    }

    function recipe(id) {
      return data.recipes.find((item) => item.id === id);
    }

    function bill(id) {
      return data.shoppingBills.find((item) => item.id === id);
    }

    function setView(view) {
      activeView = view;
      if (!["recipe-detail", "bill-detail", "settings"].includes(view)) {
        detailRecipeId = null;
        activeBillId = null;
      }
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function render() {
      renderTopbar();
      document.querySelectorAll(".view").forEach((el) => el.classList.remove("active"));
      const el = document.getElementById(`view-${activeView}`);
      if (el) el.classList.add("active");
      document.querySelectorAll(".nav-btn").forEach((btn) => {
        const tab = btn.dataset.tab;
        const active =
          activeView === tab ||
          (activeView === "recipe-detail" && tab === "recipes") ||
          (activeView === "bill-detail" && tab === "shopping");
        btn.classList.toggle("active", active);
      });
      renderHome();
      renderRecipes();
      renderRecipeDetail();
      renderPlanner();
      renderShopping();
      renderBillDetail();
      renderSettings();
    }

    function titleForView() {
      if (activeView === "home") return ["วันนี้", "ดูมื้ออาหารและบิลซื้อของ"];
      if (activeView === "recipes") return ["สูตรอาหาร", "จดสูตรจาก YouTube, TikTok หรือเพิ่มเอง"];
      if (activeView === "planner") return ["ตารางสัปดาห์", "วางแผนมื้ออาหารรายสัปดาห์"];
      if (activeView === "shopping") return ["รายการซื้อของ", "แยกเป็นบิลซื้อของแต่ละรอบ"];
      if (activeView === "settings") return ["ตั้งค่า", "สำรองและนำเข้าข้อมูล"];
      if (activeView === "recipe-detail") return ["สูตรอาหาร", "รายละเอียดสูตร"];
      if (activeView === "bill-detail") return ["บิลซื้อของ", "รายการและรูปหลังซื้อของ"];
      return ["ครัวของฉัน", ""];
    }

    function renderTopbar() {
      const [title, sub] = titleForView();
      const back = activeView === "recipe-detail" || activeView === "bill-detail" || activeView === "settings";
      const backTarget = activeView === "bill-detail" ? "shopping" : activeView === "recipe-detail" ? "recipes" : "home";
      document.getElementById("topbar").innerHTML = `
        <div>
          ${back ? `<button class="btn small ghost" type="button" data-view="${backTarget}">กลับ</button>` : ""}
          <h1>${esc(title)}</h1>
          ${sub ? `<p>${esc(sub)}</p>` : ""}
        </div>
        <div class="top-actions">
          ${activeView === "recipes" ? `<button class="icon-btn" type="button" data-action="new-recipe" title="เพิ่มสูตร">+</button>` : ""}
          ${activeView === "shopping" ? `<button class="icon-btn" type="button" data-action="new-bill" title="เพิ่มบิล">+</button>` : ""}
          <button class="icon-btn" type="button" data-view="settings" title="ตั้งค่า">⋯</button>
        </div>
      `;
    }

    function mealEntry(date, slotId) {
      return data.mealPlan[date]?.[slotId] || { recipeId: "", custom: "" };
    }

    function mealTitle(date, slotId) {
      const entry = mealEntry(date, slotId);
      const item = entry.recipeId ? recipe(entry.recipeId) : null;
      return item?.title || entry.custom || "ยังไม่ได้วางแผน";
    }

    function mealRecipe(date, slotId) {
      const entry = mealEntry(date, slotId);
      return entry.recipeId ? recipe(entry.recipeId) : null;
    }

    function thumbHtml(item, className = "thumb") {
      const initial = (item?.title || item?.name || "เมนู").trim().slice(0, 1);
      const image = item?.image || "";
      return `<div class="${className} ${image ? "has-img" : ""}" data-initial="${esc(initial)}">${image ? `<img src="${esc(image)}" alt="">` : ""}</div>`;
    }

    function renderHome() {
      const latest = [...data.recipes].sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt))).slice(0, 6);
      const bills = [...data.shoppingBills].sort((a, b) => String(b.updatedAt || b.createdAt).localeCompare(String(a.updatedAt || a.createdAt)));
      const nextBill = bills[0];
      document.getElementById("view-home").innerHTML = `
        <div class="stack">
          <section>
            <div class="section-head">
              <div><h2>มื้ออาหารวันนี้</h2><p>${longDate(todayKey())}</p></div>
              <button class="btn small ghost" type="button" data-view="planner">ดูทั้งหมด</button>
            </div>
            <div class="card pad">
              <div class="meal-list">
                ${slots.map((slot) => {
                  const item = mealRecipe(todayKey(), slot.id);
                  return `
                    <button class="meal-row" type="button" data-view="planner">
                      <div class="meal-label"><span class="meal-icon ${slot.tone === "night" ? "night" : ""}">${slot.tone === "night" ? "◐" : "○"}</span>${slot.short}</div>
                      ${item ? thumbHtml(item) : `<div class="thumb" data-initial="+"></div>`}
                      <div class="meal-main">
                        <strong>${esc(mealTitle(todayKey(), slot.id))}</strong>
                        <small>${slot.time}</small>
                      </div>
                    </button>
                  `;
                }).join("")}
              </div>
            </div>
          </section>

          <section>
            <div class="section-head"><h2>เพิ่มเมนูด่วน</h2></div>
            <div class="quick-grid">
              <button class="quick-card" type="button" data-action="quick-recipe" data-source="YouTube"><span class="quick-mark youtube">▶</span>จาก YouTube</button>
              <button class="quick-card" type="button" data-action="quick-recipe" data-source="TikTok"><span class="quick-mark tiktok">♪</span>จาก TikTok</button>
              <button class="quick-card" type="button" data-action="quick-recipe" data-source="เพิ่มเอง"><span class="quick-mark">+</span>เพิ่มเมนูเอง</button>
            </div>
          </section>

          <section>
            <div class="section-head">
              <div><h2>สูตรอาหารล่าสุด</h2><p>กลับไปสูตรที่เพิ่งจด</p></div>
              <button class="btn small ghost" type="button" data-view="recipes">ดูทั้งหมด</button>
            </div>
            ${latest.length ? `<div class="recipe-strip">${latest.map(recipeMiniHtml).join("")}</div>` : `<div class="empty"><strong>ยังไม่มีสูตรอาหาร</strong><span>กดเพิ่มเมนูเพื่อเริ่มจดสูตรแรก</span></div>`}
          </section>

          <section>
            <div class="section-head"><h2>บิลซื้อของล่าสุด</h2></div>
            ${nextBill ? billCardHtml(nextBill) : `<div class="empty"><strong>ยังไม่มีบิลซื้อของ</strong><span>สร้างบิลซื้อของแต่ละรอบ แล้วจดรายการไว้ในบิลนั้น</span><button class="btn primary" type="button" data-action="new-bill">เพิ่มบิลซื้อของ</button></div>`}
          </section>
        </div>
      `;
    }

    function recipeMiniHtml(item) {
      return `
        <button class="recipe-mini" type="button" data-action="open-recipe" data-id="${item.id}">
          ${thumbHtml(item)}
          <div class="body">
            <strong>${esc(item.title)}</strong>
            <small>จาก ${esc(item.source || "เพิ่มเอง")}</small>
          </div>
        </button>
      `;
    }

    function renderRecipes() {
      const chips = ["ทั้งหมด", ...data.categories.map((cat) => cat.name), "เมนูโปรด"];
      const q = recipeSearch.trim().toLowerCase();
      const filtered = data.recipes.filter((item) => {
        const cat = category(item.categoryId);
        const matchChip =
          activeRecipeFilter === "ทั้งหมด" ||
          activeRecipeFilter === "เมนูโปรด" && item.favorite ||
          cat?.name === activeRecipeFilter;
        const matchSearch = !q || [item.title, item.ingredients, item.steps, item.notes, item.source].join(" ").toLowerCase().includes(q);
        return matchChip && matchSearch;
      });
      document.getElementById("view-recipes").innerHTML = `
        <div class="stack">
          <div class="card pad form ${editingRecipeId ? "" : "hidden"}" id="recipe-form-wrap">
            ${recipeFormHtml()}
          </div>

          <div class="card pad form ${editingCategoryId ? "" : "hidden"}" id="category-form-wrap">
            ${categoryFormHtml()}
          </div>

          <label class="field">ค้นหาสูตร
            <input id="recipe-search" type="search" placeholder="ค้นหาเมนู ส่วนผสม หรือแหล่งที่มา" value="${esc(recipeSearch)}">
          </label>

          <div class="pill-row">
            ${chips.map((chip) => `<button class="chip ${activeRecipeFilter === chip ? "active" : ""}" type="button" data-action="filter-recipe" data-filter="${esc(chip)}">${esc(chip)}</button>`).join("")}
            <button class="chip" type="button" data-action="new-category">+ หมวด</button>
          </div>

          <div class="recipe-grid">
            ${filtered.length ? filtered.map(recipeCardHtml).join("") : `<div class="empty" style="grid-column:1/-1"><strong>ไม่พบสูตร</strong><span>ลองเปลี่ยนคำค้นหรือหมวดอาหาร</span></div>`}
          </div>
        </div>
      `;
    }

    function recipeCardHtml(item) {
      const cat = category(item.categoryId);
      return `
        <article class="recipe-card">
          <button type="button" data-action="open-recipe" data-id="${item.id}">
            ${thumbHtml(item)}
          </button>
          <div class="body">
            <div>
              <strong>${item.favorite ? "★ " : ""}${esc(item.title)}</strong>
              <small>จาก ${esc(item.source || "เพิ่มเอง")}</small>
            </div>
            <div class="recipe-meta">
              <span class="tag">${esc(cat?.name || "ไม่ระบุ")}</span>
              <button class="btn small ghost" type="button" data-action="edit-recipe" data-id="${item.id}">แก้</button>
            </div>
          </div>
        </article>
      `;
    }

    function recipeFormHtml() {
      const item = editingRecipeId && editingRecipeId !== "new" ? recipe(editingRecipeId) : null;
      return `
        <form class="form" id="recipe-form">
          <div class="section-head">
            <h2>${item ? "แก้สูตรอาหาร" : "เพิ่มสูตรใหม่"}</h2>
            <button class="btn small ghost" type="button" data-action="cancel-recipe">ปิด</button>
          </div>
          <label class="field">ชื่อเมนู
            <input name="title" required maxlength="80" placeholder="เช่น ข้าวต้มหมูสับ" value="${esc(item?.title || "")}">
          </label>
          <div class="two-col">
            <label class="field">หมวด
              <select name="categoryId" required>${data.categories.map((cat) => `<option value="${cat.id}" ${item?.categoryId === cat.id ? "selected" : ""}>${esc(cat.name)}</option>`).join("")}</select>
            </label>
            <label class="field">แหล่งที่มา
              <select name="source">${sourceOptions.map((src) => `<option value="${src}" ${(item?.source || "เพิ่มเอง") === src ? "selected" : ""}>${src}</option>`).join("")}</select>
            </label>
          </div>
          <label class="field">ลิงก์วิดีโอ
            <input name="videoUrl" type="url" placeholder="วางลิงก์ YouTube หรือ TikTok" value="${esc(item?.videoUrl || "")}">
          </label>
          <label class="field">รูปเมนู
            <span>อัปโหลดจากเครื่อง หรือวาง URL รูปภาพก็ได้</span>
            <input name="imageUrl" placeholder="URL รูปภาพ" value="${esc(item?.image && !item.image.startsWith("data:") ? item.image : "")}">
          </label>
          <input id="recipe-image-file" type="file" accept="image/*">
          ${item?.image ? `<div class="photo-grid"><div class="photo-tile"><img src="${esc(item.image)}" alt=""></div></div>` : ""}
          <label class="field">ส่วนผสม
            <textarea name="ingredients" placeholder="ใส่ทีละบรรทัด">${esc(item?.ingredients || "")}</textarea>
          </label>
          <label class="field">ขั้นตอน
            <textarea name="steps" placeholder="ใส่ขั้นตอนแบบสั้น ๆ">${esc(item?.steps || "")}</textarea>
          </label>
          <label class="field">โน้ต
            <textarea name="notes" placeholder="ปรับสูตร ความเผ็ด หรือจุดที่ต้องจำ">${esc(item?.notes || "")}</textarea>
          </label>
          <label><input name="favorite" type="checkbox" ${item?.favorite ? "checked" : ""} style="width:auto;min-height:auto"> เมนูโปรด</label>
          <div class="form-actions">
            ${item ? `<button class="btn danger" type="button" data-action="delete-recipe" data-id="${item.id}">ลบสูตร</button>` : ""}
            <button class="btn primary" type="submit">บันทึกสูตร</button>
          </div>
        </form>
      `;
    }

    function categoryFormHtml() {
      const item = editingCategoryId && editingCategoryId !== "new" ? category(editingCategoryId) : null;
      return `
        <form class="form" id="category-form">
          <div class="section-head">
            <h2>${item ? "แก้หมวด" : "เพิ่มหมวด"}</h2>
            <button class="btn small ghost" type="button" data-action="cancel-category">ปิด</button>
          </div>
          <label class="field">ชื่อหมวด
            <input name="name" required maxlength="36" placeholder="เช่น เมนูคลีน" value="${esc(item?.name || "")}">
          </label>
          <div class="form-actions">
            ${item ? `<button class="btn danger" type="button" data-action="delete-category" data-id="${item.id}">ลบหมวด</button>` : ""}
            <button class="btn primary" type="submit">บันทึกหมวด</button>
          </div>
        </form>
      `;

      const pct = total ? Math.round(done / total * 100) : 0;
      return { total, done, pct };
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("button, label.btn");
      if (!target) return;
      const view = target.dataset.view;
      const tab = target.dataset.tab;
      const action = target.dataset.action;
      const id = target.dataset.id;
      if (view) { setView(view); return; }
      if (tab) { setView(tab); return; }
      if (!action) return;

      if (action === "quick-recipe") {
        editingRecipeId = "new";
        setView("recipes");
        setTimeout(() => {
          const sourceSelect = document.querySelector("#recipe-form select[name='source']");
          if (sourceSelect) sourceSelect.value = target.dataset.source || "เพิ่มเอง";
        }, 0);
      }
      if (action === "new-recipe") { editingRecipeId = "new"; setView("recipes"); }
      if (action === "cancel-recipe") { editingRecipeId = null; render(); }
      if (action === "edit-recipe") { editingRecipeId = id; setView("recipes"); }
      if (action === "open-recipe") { detailRecipeId = id; setView("recipe-detail"); }
      if (action === "delete-recipe") deleteRecipe(id);
      if (action === "toggle-favorite") toggleFavorite(id);
      if (action === "ingredients-to-bill") ingredientsToBill(id);
      if (action === "new-category") { editingCategoryId = "new"; render(); }
      if (action === "cancel-category") { editingCategoryId = null; render(); }
      if (action === "delete-category") deleteCategory(id);
      if (action === "filter-recipe") { activeRecipeFilter = target.dataset.filter; render(); }
      if (action === "select-day") { selectedDate = target.dataset.date; render(); }
      if (action === "auto-plan") autoPlan();
      if (action === "focus-plan") toast("เลือกเมนูจากช่องด้านขวาได้เลย");
      if (action === "new-bill") { editingBillId = "new"; setView("shopping"); }
      if (action === "cancel-bill") { editingBillId = null; render(); }
      if (action === "edit-bill") { editingBillId = id; setView("shopping"); }
      if (action === "delete-bill") deleteBill(id);
      if (action === "open-bill") { activeBillId = id; editingItemId = null; setView("bill-detail"); }
      if (action === "new-item") { editingItemId = "new"; render(); }
      if (action === "cancel-item") { editingItemId = null; render(); }
      if (action === "edit-item") { editingItemId = id; render(); }
      if (action === "delete-item") deleteBillItem(id);
      if (action === "delete-bill-photo") deleteBillPhoto(Number(target.dataset.index));
      if (action === "export-json") exportJson();
      if (action === "reset-data") resetData();
    });

    document.addEventListener("input", (event) => {
      const target = event.target;
      if (target.id === "recipe-search") {
        recipeSearch = target.value;
        renderRecipes();
      }
      if (target.dataset.action === "plan-custom") {
        updatePlan(target.dataset.slot, { recipeId: "", custom: target.value }, false);
      }
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      if (target.dataset.action === "plan-recipe") {
        updatePlan(target.dataset.slot, { recipeId: target.value, custom: "" });
      }
      if (target.dataset.action === "toggle-item") {
        const parent = bill(activeBillId);
        const item = parent?.items.find((row) => row.id === target.dataset.id);
        if (item) {
          item.done = target.checked;
          parent.updatedAt = new Date().toISOString();
          save(item.done ? "ติ๊กซื้อแล้ว" : "ย้ายกลับไปรายการที่ต้องซื้อ");
        }
      }
      if (target.id === "bill-photo-input") {
        addBillPhotos(target.files);
        target.value = "";
      }
      if (target.id === "import-json") {
        importJson(target.files[0]);
        target.value = "";
      }
    });

    document.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (event.target.id === "recipe-form") await saveRecipe(new FormData(event.target));
      if (event.target.id === "category-form") saveCategory(new FormData(event.target));
      if (event.target.id === "bill-form") saveBill(new FormData(event.target));
      if (event.target.id === "item-form") saveBillItem(new FormData(event.target));
      if (event.target.id === "settings-form") saveSettings(new FormData(event.target));
    });

    async function readFirstImage(inputId) {
      const input = document.getElementById(inputId);
      const file = input?.files?.[0];
      if (!file) return "";
      return readFile(file);
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function saveRecipe(form) {
      const title = form.get("title").trim();
      if (!title) return;
      const upload = await readFirstImage("recipe-image-file");
      const imageUrl = form.get("imageUrl").trim();
      const current = editingRecipeId && editingRecipeId !== "new" ? recipe(editingRecipeId) : null;
      const payload = {
        title,
        categoryId: form.get("categoryId"),
        source: form.get("source"),
        videoUrl: form.get("videoUrl").trim(),
        image: upload || imageUrl || current?.image || "",
        ingredients: form.get("ingredients").trim(),
        steps: form.get("steps").trim(),
        notes: form.get("notes").trim(),
        favorite: Boolean(form.get("favorite")),
        updatedAt: new Date().toISOString()
      };
      if (current) {
        Object.assign(current, payload);
      } else {
        data.recipes.unshift({ id: uid("recipe"), ...payload, createdAt: new Date().toISOString() });
      }
      editingRecipeId = null;
      save("บันทึกสูตรแล้ว");
    }

    function deleteRecipe(id) {
      if (!confirm("ลบสูตรนี้ใช่ไหม")) return;
      data.recipes = data.recipes.filter((item) => item.id !== id);
      Object.values(data.mealPlan).forEach((day) => {
        slots.forEach((slot) => {
          if (day[slot.id]?.recipeId === id) day[slot.id].recipeId = "";
        });
      });
      detailRecipeId = null;
      activeView = "recipes";
      save("ลบสูตรแล้ว");
    }

    function toggleFavorite(id) {
      const item = recipe(id);
      if (!item) return;
      item.favorite = !item.favorite;
      item.updatedAt = new Date().toISOString();
      save(item.favorite ? "เพิ่มเป็นเมนูโปรดแล้ว" : "เอาออกจากเมนูโปรดแล้ว");
    }

    function saveCategory(form) {
      const name = form.get("name").trim();
      if (!name) return;
      if (editingCategoryId && editingCategoryId !== "new") {
        category(editingCategoryId).name = name;
      } else {
        data.categories.push({ id: uid("cat"), name, createdAt: new Date().toISOString() });
      }
      editingCategoryId = null;
      save("บันทึกหมวดแล้ว");
    }

    function deleteCategory(id) {
      if (data.recipes.some((item) => item.categoryId === id)) {
        toast("หมวดนี้ยังมีสูตรอยู่ ย้ายหรือลบสูตรก่อน");
        return;
      }
      if (!confirm("ลบหมวดนี้ใช่ไหม")) return;
      data.categories = data.categories.filter((item) => item.id !== id);
      editingCategoryId = null;
      save("ลบหมวดแล้ว");
    }

    function updatePlan(slotId, entry, notify = true) {
      if (!data.mealPlan[selectedDate]) data.mealPlan[selectedDate] = {};
      data.mealPlan[selectedDate][slotId] = { ...mealEntry(selectedDate, slotId), ...entry };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      if (notify) save("อัปเดตตารางแล้ว");
    }

    function autoPlan() {
      if (!data.recipes.length) {
        toast("ยังไม่มีสูตรให้วางแผน");
        return;
      }
      if (!data.mealPlan[selectedDate]) data.mealPlan[selectedDate] = {};
      slots.forEach((slot, index) => {
        const pick = data.recipes[(Math.floor(Math.random() * data.recipes.length) + index) % data.recipes.length];
        data.mealPlan[selectedDate][slot.id] = { recipeId: pick.id, custom: "" };
      });
      save("วางแผนอัตโนมัติแล้ว");
    }

    function saveBill(form) {
      const title = form.get("title").trim();
      if (!title) return;
      const payload = {
        title,
        date: form.get("date") || todayKey(),
        budget: form.get("budget").trim(),
        updatedAt: new Date().toISOString()
      };
      if (editingBillId && editingBillId !== "new") {
        Object.assign(bill(editingBillId), payload);
      } else {
        data.shoppingBills.unshift({ id: uid("bill"), ...payload, photos: [], items: [], createdAt: new Date().toISOString() });
      }
      editingBillId = null;
      save("บันทึกบิลแล้ว");
    }

    function deleteBill(id) {
      if (!confirm("ลบบิลซื้อของนี้ใช่ไหม")) return;
      data.shoppingBills = data.shoppingBills.filter((item) => item.id !== id);
      editingBillId = null;
      activeBillId = null;
      activeView = "shopping";
      save("ลบบิลแล้ว");
    }

    function saveBillItem(form) {
      const parent = bill(activeBillId);
      if (!parent) return;
      const name = form.get("name").trim();
      if (!name) return;
      const payload = {
        name,
        qty: form.get("qty").trim(),
        unit: form.get("unit").trim(),
        group: form.get("group"),
        done: false
      };
      if (editingItemId && editingItemId !== "new") {
        Object.assign(parent.items.find((row) => row.id === editingItemId), payload);
      } else {
        parent.items.push({ id: uid("item"), ...payload });
      }
      parent.updatedAt = new Date().toISOString();
      editingItemId = null;
      save("บันทึกรายการแล้ว");
    }

    function deleteBillItem(id) {
      const parent = bill(activeBillId);
      if (!parent) return;
      if (!confirm("ลบรายการนี้ใช่ไหม")) return;
      parent.items = parent.items.filter((row) => row.id !== id);
      parent.updatedAt = new Date().toISOString();
      editingItemId = null;
      save("ลบรายการแล้ว");
    }

    async function addBillPhotos(files) {
      const parent = bill(activeBillId);
      if (!parent || !files?.length) return;
      const images = await Promise.all([...files].slice(0, 6).map(readFile));
      parent.photos = [...(parent.photos || []), ...images].slice(0, 12);
      parent.updatedAt = new Date().toISOString();
      save("เพิ่มรูปในบิลแล้ว");
    }

    function deleteBillPhoto(index) {
      const parent = bill(activeBillId);
      if (!parent) return;
      parent.photos.splice(index, 1);
      parent.updatedAt = new Date().toISOString();
      save("ลบรูปแล้ว");
    }

    function ingredientsToBill(recipeId) {
      const item = recipe(recipeId);
      if (!item?.ingredients) {
        toast("สูตรนี้ยังไม่มีส่วนผสม");
        return;
      }
      let parent = data.shoppingBills[0];
      if (!parent) {
        parent = { id: uid("bill"), title: "บิลจากสูตรอาหาร", date: todayKey(), budget: "", photos: [], items: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
        data.shoppingBills.unshift(parent);
      }
      item.ingredients.split("\n").map((line) => line.trim()).filter(Boolean).forEach((line) => {
        parent.items.push({ id: uid("item"), name: line, qty: "", unit: "", group: "อื่น ๆ", done: false });
      });
      parent.updatedAt = new Date().toISOString();
      save("เพิ่มส่วนผสมลงบิลล่าสุดแล้ว");
    }

    function saveSettings(form) {
      data.settings.cycleDays = Number(form.get("cycleDays"));
      data.settings.cycleStart = form.get("cycleStart") || todayKey();
      save("บันทึกตั้งค่าแล้ว");
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `my-kitchen-${todayKey()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast("Export ข้อมูลแล้ว");
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          data = normalize(JSON.parse(reader.result));
          save("Import ข้อมูลแล้ว");
        } catch (error) {
          toast("ไฟล์ JSON ไม่ถูกต้อง");
        }
      };
      reader.readAsText(file);
    }

    function resetData() {
      if (!confirm("รีเซ็ตข้อมูลทั้งหมดกลับเป็นตัวอย่างเริ่มต้นใช่ไหม")) return;
      data = seedData();
      activeView = "home";
      save("รีเซ็ตข้อมูลแล้ว");
    }

    render();
  </script>
</body>
</html>
